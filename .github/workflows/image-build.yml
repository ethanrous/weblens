name: Build image

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: "Build Tag"
        required: false
        default: ""
        type: string
      do_release_build:
        description: "Release"
        required: false
        default: false
        type: boolean

  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  compute-tag:
    runs-on: ubuntu-latest
    outputs:
      build_tag: ${{ steps.tag.outputs.build_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute build tag
        id: tag
        run: |
          if [[ -z "$BUILD_TAG" ]] && [[ "$RELEASE_BUILD" == true ]]; then
            echo "ERR BUILD_TAG must be specified when doing release build"
            exit 1
          elif [ -z "$BUILD_TAG" ] && [ "$GITHUB_REF" == "refs/heads/main" ]; then
            BUILD_TAG="amethyst-${{ github.run_number }}"
          elif [ -z "$BUILD_TAG" ]; then
            BUILD_TAG="dev-$(git rev-parse --short HEAD)"
          fi
          echo "build_tag=$BUILD_TAG" >> "$GITHUB_OUTPUT"
        env:
          BUILD_TAG: ${{ inputs.build_tag }}
          RELEASE_BUILD: ${{ inputs.do_release_build }}

  build-image:
    needs: compute-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Use the GITHUB_TOKEN secret provided by GitHub Actions
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoGoGadgetDocker
        run: |
          echo "Grab the new image at" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/ethanrous/weblens:${BUILD_TAG}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          ./scripts/gogogadgetdocker.bash -p -s -t $BUILD_TAG
          exit $?
        env:
          BUILD_TAG: ${{ needs.compute-tag.outputs.build_tag }}
          ENVIRON: ${{ inputs.deploy }}

  build-embed-image:
    needs: compute-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute embed image tags
        id: meta
        run: |
          TAGS="ghcr.io/ethanrous/weblens_embed:${BUILD_TAG}"
          if [ "$GITHUB_REF" == "refs/heads/main" ] || [ "$RELEASE_BUILD" == true ]; then
            TAGS="${TAGS}"$'\n'"ghcr.io/ethanrous/weblens_embed:latest"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Grab the new embed image at" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$TAGS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          BUILD_TAG: ${{ needs.compute-tag.outputs.build_tag }}
          RELEASE_BUILD: ${{ inputs.do_release_build }}

      - name: Build and push embed image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/embed.Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=embed
          cache-to: type=gha,mode=max,scope=embed
