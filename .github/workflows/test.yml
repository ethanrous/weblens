name: Weblens Fulltest

on:
  workflow_dispatch:
    inputs:
      trace:
        description: "Trace"
        required: true
        default: false
        type: boolean
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GH_TOKEN: ${{ github.token }}

permissions:
  contents: read
  packages: write

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-docker-action@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: |
            - cwd: weblens-vue/weblens-nuxt
            - cwd: api/ts

      # - name: Set up Homebrew
      #   uses: Homebrew/actions/setup-homebrew@main

      - name: Ensure swaggo up to date
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          pnpm install @openapitools/openapi-generator-cli -g
          # brew install openapi-generator
          pnpm install -g tsup

          make swag
          # This is not meant to be ./api/docs, it is ./api and ./docs. 2 Different directories
          if ! git diff --exit-code -- api/ docs/; then
            echo "API docs are out of date. Please run 'make swag' and commit the changes."
            exit 1
          fi

      - name: Run Tests
        run: |
          # Restart docker to fix networking bug...
          sudo systemctl restart docker

          ./scripts/test-weblens.bash

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-logs
          path: |
            _build/logs/
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: |
            - cwd: api/ts
            - cwd: weblens-vue/weblens-nuxt

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

      - name: pnpm lint
        run: |
          source ./scripts/lib/all.bash && build_frontend
          cd weblens-vue/weblens-nuxt
          pnpm lint
          exit $?

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-docker-action@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: |
            - cwd: weblens-vue/weblens-nuxt

      - name: Install Playwright browsers
        working-directory: weblens-vue/weblens-nuxt
        run: pnpm exec playwright install --with-deps chromium

      - name: Preload mongo image
        run: docker pull mongodb/mongodb-atlas-local:8.2.5

      - name: Run E2E tests
        run: |
          sudo systemctl restart docker

          export WEBLENS_VERBOSE=true

          ./scripts/test-playwright.bash
          exit $?

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            _build/playwright/
            _build/logs/
          retention-days: 7

  test-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-docker-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Use the GITHUB_TOKEN secret provided by GitHub Actions
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoGoGadgetDocker
        run: |
          sudo systemctl restart docker

          ./scripts/gogogadgetdocker.bash -s -t devel -a amd64

          REF=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          docker tag ghcr.io/ethanrous/weblens:devel ghcr.io/ethanrous/weblens:devel-$REF-$GITHUB_SHA

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          REF=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          docker push ghcr.io/ethanrous/weblens:devel-$REF-$GITHUB_SHA

          echo "Built and pushed image:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/ethanrous/weblens:devel-$REF-$GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  test-build-embed-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-docker-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Use the GITHUB_TOKEN secret provided by GitHub Actions
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build embed image
        run: |
          sudo systemctl restart docker

          REF=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          docker build -f docker/embed.Dockerfile -t ghcr.io/ethanrous/weblens_embed:devel-$REF-$GITHUB_SHA .

      - name: Push embed image
        if: github.event_name != 'pull_request'
        run: |
          REF=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          docker push ghcr.io/ethanrous/weblens_embed:devel-$REF-$GITHUB_SHA

          echo "Built and pushed embed image:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/ethanrous/weblens_embed:devel-$REF-$GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
