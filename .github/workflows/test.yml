name: Weblens Fulltest

on:
  workflow_dispatch:
    inputs:
      trace:
        description: "Trace"
        required: true
        default: false
        type: boolean
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-docker-action@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: |
            - cwd: weblens-vue/weblens-nuxt
            - cwd: api/ts

      # - name: Set up Homebrew
      #   uses: Homebrew/actions/setup-homebrew@main

      - name: Ensure swaggo up to date
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          pnpm install @openapitools/openapi-generator-cli -g
          # brew install openapi-generator
          pnpm install -g tsup

          make swag
          # This is not meant to be ./api/docs, it is ./api and ./docs. 2 Different directories
          if ! git diff --exit-code -- api/ docs/; then
            echo "API docs are out of date. Please run 'make swag' and commit the changes."
            exit 1
          fi

      - name: Run Tests
        run: |
          # Restart docker to fix networking bug...
          sudo systemctl restart docker

          ./scripts/test-weblens.bash

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-logs
          path: |
            _build/logs/
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: |
            - cwd: api/ts
            - cwd: weblens-vue/weblens-nuxt

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

      - name: pnpm lint
        run: |
          source ./scripts/lib/all.bash && build_frontend
          cd weblens-vue/weblens-nuxt
          pnpm lint
          exit $?

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-docker-action@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: |
            - cwd: weblens-vue/weblens-nuxt

      - name: Install Playwright browsers
        working-directory: weblens-vue/weblens-nuxt
        run: pnpm exec playwright install --with-deps chromium

      - name: Preload mongo image
        run: docker pull mongodb/mongodb-atlas-local:8.2.5

      - name: Run E2E tests
        run: |
          sudo systemctl restart docker

          export WEBLENS_VERBOSE=true

          ./scripts/test-playwright.bash
          exit $?

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            _build/playwright/
            _build/logs/
          retention-days: 7

  test-build-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-docker-action@v4

      - name: GoGoGadgetDocker
        run: |
          sudo systemctl restart docker

          ./scripts/gogogadgetdocker.bash -s -t devel -a amd64
          exit $?
